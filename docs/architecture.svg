<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="760" viewBox="0 0 1240 760" role="img" aria-labelledby="title desc">
  <title id="title">LabSignal architecture</title>
  <desc id="desc">Slack messages reach a Bolt Socket Mode app, which asks Claude Opus 4.8 to answer. Every tool Claude can call is discovered from the LabSignal MCP server over a stdio session, including a read_slack_channel tool that reads the workspace back. Without an Anthropic key the app degrades to a deterministic keyword router.</desc>

  <defs>
    <style>
      .bg     { fill: #f7f8fa; }
      .panel  { fill: #ffffff; stroke: #d8dee8; stroke-width: 2; }
      .slack  { fill: #4a154b; }
      .agent  { fill: #1264a3; }
      .claude { fill: #c15f3c; }
      .mcp    { fill: #5b3cc4; }
      .tool   { fill: #2e7d32; }
      .t      { font-family: "Segoe UI", Helvetica, Arial, sans-serif; }
      .h1     { font-size: 26px; font-weight: 700; fill: #1d2330; }
      .sub    { font-size: 14px; fill: #6b7684; }
      .lbl    { font-size: 15px; font-weight: 600; fill: #ffffff; }
      .lblsm  { font-size: 12px; fill: #e8ecf3; }
      .cap    { font-size: 12.5px; fill: #4a5566; }
      .capb   { font-size: 13px; font-weight: 600; fill: #1d2330; }
      .monow  { font-family: Consolas, "SF Mono", Menlo, monospace; font-size: 12.5px; fill: #ffffff; }
      .mono   { font-family: Consolas, "SF Mono", Menlo, monospace; font-size: 12.5px; fill: #2b3444; }
      .flow   { stroke: #8892a4; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .flowb  { stroke: #5b3cc4; stroke-width: 3.5; fill: none; marker-end: url(#arrowp); }
      .back   { stroke: #2e7d32; stroke-width: 2; fill: none; stroke-dasharray: 6 4; marker-end: url(#arrowg); }
      .fall   { stroke: #b0b8c5; stroke-width: 2; fill: none; stroke-dasharray: 5 5; marker-end: url(#arrowm); }
    </style>
    <marker id="arrow"  markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#8892a4"/></marker>
    <marker id="arrowp" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#5b3cc4"/></marker>
    <marker id="arrowg" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#2e7d32"/></marker>
    <marker id="arrowm" markerWidth="9" markerHeight="9" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#b0b8c5"/></marker>
  </defs>

  <rect class="bg" width="1240" height="760"/>
  <text class="t h1" x="40" y="52">LabSignal</text>
  <text class="t sub" x="40" y="76">A Slack agent for research labs. Every capability it has arrives over MCP.</text>

  <!-- Slack surfaces -->
  <rect class="panel" x="40" y="152" width="250" height="180" rx="10"/>
  <text class="t capb" x="60" y="180">Slack workspace</text>
  <rect class="slack" x="60" y="194" width="210" height="34" rx="6"/>
  <text class="t lbl" x="72" y="216">Assistant pane</text>
  <rect class="slack" x="60" y="236" width="210" height="34" rx="6"/>
  <text class="t lbl" x="72" y="258">@LabSignal (in-thread)</text>
  <rect class="slack" x="60" y="278" width="210" height="34" rx="6"/>
  <text class="t monow" x="72" y="300">/labsignal</text>

  <!-- Bolt -->
  <rect class="agent" x="360" y="192" width="200" height="100" rx="10"/>
  <text class="t lbl" x="380" y="224">Bolt (Socket Mode)</text>
  <text class="t lblsm" x="380" y="248">LabSignalAgent</text>
  <text class="t lblsm" x="380" y="268">no public URL needed</text>
  <path class="flow" d="M292,242 L354,242"/>

  <!-- Claude -->
  <rect class="claude" x="640" y="182" width="230" height="120" rx="10"/>
  <text class="t lbl" x="660" y="214">Claude Opus 4.8</text>
  <text class="t lblsm" x="660" y="238">tool-use loop</text>
  <text class="t lblsm" x="660" y="260">picks tools, chains them,</text>
  <text class="t lblsm" x="660" y="280">decides when to stop</text>
  <path class="flow" d="M562,242 L634,242"/>

  <!-- fallback -->
  <rect class="panel" x="920" y="182" width="280" height="120" rx="10"/>
  <text class="t capb" x="940" y="212">Graceful degradation</text>
  <text class="t cap" x="940" y="238">With no ANTHROPIC_API_KEY, or if</text>
  <text class="t cap" x="940" y="256">the Claude call fails, LabSignal</text>
  <text class="t cap" x="940" y="274">falls back to a deterministic</text>
  <text class="t cap" x="940" y="292">keyword router. It still answers.</text>
  <path class="fall" d="M876,242 L914,242"/>

  <!-- MCP band -->
  <rect class="mcp" x="360" y="404" width="510" height="76" rx="10"/>
  <text class="t lbl" x="384" y="434">MCP stdio session</text>
  <text class="t monow" x="384" y="460">list_tools() → 7 schemas · call_tool() → results</text>
  <rect x="700" y="418" width="152" height="48" rx="6" fill="#ffffff"/>
  <text class="t" x="716" y="438" font-size="15" font-weight="700" fill="#5b3cc4">REQUIRED</text>
  <text class="t" x="716" y="458" font-size="12" font-weight="600" fill="#5b3cc4">TECHNOLOGY</text>
  <path class="flowb" d="M700,306 L700,340 L615,340 L615,398"/>
  <text class="t cap" x="628" y="366">tools discovered at startup,</text>
  <text class="t cap" x="628" y="384">not hardcoded in the prompt</text>

  <!-- MCP server + tools -->
  <rect class="panel" x="360" y="520" width="510" height="196" rx="10"/>
  <text class="t mono" x="384" y="548">labsignal.mcp_server</text>
  <text class="t cap" x="384" y="568">Also runs standalone in Claude Desktop or any MCP client.</text>

  <rect class="tool" x="384" y="584" width="228" height="30" rx="5"/>
  <text class="t monow" x="394" y="604">read_slack_channel</text>
  <rect class="tool" x="620" y="584" width="228" height="30" rx="5"/>
  <text class="t monow" x="630" y="604">build_research_brief</text>
  <rect class="tool" x="384" y="622" width="228" height="30" rx="5"/>
  <text class="t monow" x="394" y="642">extract_action_items</text>
  <rect class="tool" x="620" y="622" width="228" height="30" rx="5"/>
  <text class="t monow" x="630" y="642">detect_risks</text>
  <rect class="tool" x="384" y="660" width="228" height="30" rx="5"/>
  <text class="t monow" x="394" y="680">search_protocols</text>
  <rect class="tool" x="620" y="660" width="228" height="30" rx="5"/>
  <text class="t monow" x="630" y="680">plan_experiment · summarize</text>
  <path class="flowb" d="M615,484 L615,514"/>

  <!-- read-back into Slack -->
  <path class="back" d="M384,599 L165,599 L165,342"/>
  <text class="t cap" x="52" y="640">read_slack_channel pulls the real</text>
  <text class="t cap" x="52" y="658">conversation through Slack&#8217;s Web API,</text>
  <text class="t cap" x="52" y="676">so nobody has to paste it in.</text>

  <!-- reply path -->
  <path class="flow" d="M640,206 L600,206 L600,130 L292,130"/>
  <text class="t cap" x="330" y="122">Block Kit reply, in-thread,</text>
  <text class="t cap" x="330" y="104">footed with the MCP tools used</text>

  <!-- explicit arrowheads (SVG markers are dropped by some renderers) -->
  <polygon points="354,242 344,237 344,247" fill="#8892a4"/>
  <polygon points="634,242 624,237 624,247" fill="#8892a4"/>
  <polygon points="292,130 302,125 302,135" fill="#8892a4"/>
  <polygon points="914,242 904,237 904,247" fill="#b0b8c5"/>
  <polygon points="615,398 610,388 620,388" fill="#5b3cc4"/>
  <polygon points="615,514 610,504 620,504" fill="#5b3cc4"/>
  <polygon points="165,342 160,352 170,352" fill="#2e7d32"/>
</svg>
