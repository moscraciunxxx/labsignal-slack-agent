display_information:
  name: LabSignal
  description: Research ops agent for summaries, action items, and protocol lookup.
features:
  bot_user:
    display_name: LabSignal
    always_online: true
  slash_commands:
    - command: /labsignal
      description: Ask LabSignal for actions, summaries, or protocols.
      usage_hint: actions Alice will QC CA1 recordings by Friday.
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - commands
settings:
  event_subscriptions:
    bot_events:
      - app_mention
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false

